<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Internships</title>
<style>
  :root {
    --paper: #FAFAF7;
    --ink: #1C1E26;
    --ink-soft: #5B5E6B;
    --line: #E4E2DA;
    --card: #FFFFFF;
    --on-track: #2F6F62;
    --on-track-bg: #E7F0EE;
    --pending: #C97A2E;
    --pending-bg: #FBEEDE;
    --overdue: #B8443D;
    --overdue-bg: #FBE9E7;
    --focus: #2F6F62;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    line-height: 1.5;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 20px 80px;
  }

  header.page-head { margin-bottom: 24px; }

  header.page-head h1 {
    font-size: 1.6rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }

  header.page-head p {
    margin: 0;
    color: var(--ink-soft);
    font-size: 0.95rem;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .filter-chip {
    font-size: 0.85rem;
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
  }

  .filter-chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .search-box {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 0.95rem;
    margin-bottom: 16px;
  }

  .search-box:focus { outline: 2px solid var(--focus); outline-offset: 1px; }

  .internship-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .internship-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .internship-card:hover { border-color: #C7C4B8; }
  .internship-card:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .internship-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .internship-title { font-weight: 600; font-size: 1rem; }
  .internship-org { color: var(--ink-soft); font-size: 0.85rem; margin-top: 2px; }

  .tag {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--on-track-bg);
    color: var(--on-track);
    white-space: nowrap;
  }

  .internship-meta {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    font-size: 0.82rem;
    color: var(--ink-soft);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    border: 1px dashed var(--line);
    border-radius: 10px;
  }

  /* Detail panel */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28, 30, 38, 0.35);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }

  @media (min-width: 640px) { .panel-overlay { align-items: center; } }

  .panel {
    background: var(--card);
    width: 100%;
    max-width: 540px;
    border-radius: 14px 14px 0 0;
    padding: 24px;
    max-height: 90vh;
    overflow-y: auto;
  }

  @media (min-width: 640px) { .panel { border-radius: 14px; } }

  .panel h2 { margin: 0 0 4px; font-size: 1.2rem; }
  .panel .panel-org { color: var(--ink-soft); font-size: 0.9rem; margin-bottom: 16px; }
  .panel .panel-desc { font-size: 0.92rem; margin-bottom: 16px; }

  .panel-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  button {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    border: none;
  }

  .btn-primary { background: var(--ink); color: #fff; }
  .btn-secondary { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-primary:disabled { background: var(--line); color: var(--ink-soft); cursor: default; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: var(--ink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
</style>
</head>
<body>

<div class="wrap">
  <header class="page-head">
    <h1>Browse Internships</h1>
    <p>Find an opportunity that matches your interests.</p>
  </header>

  <input type="text" class="search-box" id="searchBox" placeholder="Search by title or organization...">

  <div class="filters" id="filters"></div>

  <div id="internshipList" class="internship-list"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ---- Mock data. Replace with a fetch() call to your API once it's ready. ----
  let internships = [
    {
      id: "i1",
      title: "Community Radio Reporting Intern",
      org: "Radio Salus",
      category: "Media",
      location: "Huye, Rwanda",
      duration: "8 weeks",
      description: "Support local reporting on rural education access, shadow producers, and help translate segments into Kinyarwanda.",
      applied: false
    },
    {
      id: "i2",
      title: "Public Speaking Coach Assistant",
      org: "ALU Speaks Program",
      category: "Education",
      location: "Kigali, Rwanda",
      duration: "6 weeks",
      description: "Help run public speaking workshops for secondary school students in partner communities.",
      applied: false
    },
    {
      id: "i3",
      title: "Media Literacy Curriculum Intern",
      org: "Girls in ICT Rwanda",
      category: "Media",
      location: "Remote",
      duration: "10 weeks",
      description: "Help design lesson materials teaching students to critically evaluate news sources.",
      applied: true
    },
    {
      id: "i4",
      title: "Data & Impact Intern",
      org: "SkillConnect",
      category: "Tech",
      location: "Remote",
      duration: "12 weeks",
      description: "Analyze student-mentor matching data and help improve the platform's recommendation logic.",
      applied: false
    }
  ];

  const listEl = document.getElementById("internshipList");
  const filtersEl = document.getElementById("filters");
  const searchBox = document.getElementById("searchBox");
  const toastEl = document.getElementById("toast");

  const categories = ["All", ...new Set(internships.map(i => i.category))];
  let activeCategory = "All";
  let query = "";

  function renderFilters() {
    filtersEl.innerHTML = categories.map(cat => `
      <button class="filter-chip ${cat === activeCategory ? "active" : ""}" data-cat="${cat}">${cat}</button>
    `).join("");

    filtersEl.querySelectorAll(".filter-chip").forEach(btn => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.cat;
        renderFilters();
        renderList();
      });
    });
  }

  function renderList() {
    const filtered = internships.filter(i => {
      const matchesCategory = activeCategory === "All" || i.category === activeCategory;
      const matchesQuery = (i.title + i.org).toLowerCase().includes(query.toLowerCase());
      return matchesCategory && matchesQuery;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state">
          <strong>No internships match your search.</strong><br>
          Try a different keyword or filter.
        </div>`;
      return;
    }

    listEl.innerHTML = filtered.map(i => `
      <div class="internship-card" tabindex="0" data-id="${i.id}" role="button" aria-label="View ${i.title}">
        <div class="internship-top">
          <div>
            <div class="internship-title">${i.title}</div>
            <div class="internship-org">${i.org}</div>
          </div>
          ${i.applied ? '<span class="tag">Applied</span>' : ""}
        </div>
        <div class="internship-meta">
          <span>${i.location}</span>
          <span>${i.duration}</span>
        </div>
      </div>
    `).join("");

    listEl.querySelectorAll(".internship-card").forEach(card => {
      card.addEventListener("click", () => openDetail(card.dataset.id));
      card.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDetail(card.dataset.id); }
      });
    });
  }

  function openDetail(id) {
    const internship = internships.find(i => i.id === id);
    if (!internship) return;

    const overlay = document.createElement("div");
    overlay.className = "panel-overlay";

    overlay.innerHTML = `
      <div class="panel">
        <h2>${internship.title}</h2>
        <div class="panel-org">${internship.org} · ${internship.location} · ${internship.duration}</div>
        <div class="panel-desc">${internship.description}</div>
        <div class="panel-actions">
          <button class="btn-secondary" data-close>Close</button>
          <button class="btn-primary" data-apply ${internship.applied ? "disabled" : ""}>
            ${internship.applied ? "Already applied" : "Apply"}
          </button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    overlay.querySelector("[data-close]").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

    overlay.querySelector("[data-apply]")?.addEventListener("click", () => {
      if (internship.applied) return;
      internship.applied = true;
      overlay.remove();
      renderList();
      showToast("Application sent!");
    });
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  searchBox.addEventListener("input", e => {
    query = e.target.value;
    renderList();
  });

  renderFilters();
  renderList();
</script>

</body>
</html>
